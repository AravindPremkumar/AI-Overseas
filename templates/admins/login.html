{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Broadways International</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1C3A4A',
                        'primary-dark': '#0F2530',
                        accent: '#D4621A',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0F2530; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Decorative Gradients -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-accent/20 rounded-full blur-[150px] -translate-y-1/2 translate-x-1/2"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-primary-light/10 rounded-full blur-[150px] translate-y-1/2 -translate-x-1/2"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-10 transition-transform duration-500 hover:scale-105">
            <div class="relative w-20 h-20 mb-4 bg-white/5 rounded-3xl p-4 flex items-center justify-center border border-white/10 shadow-2xl">
                <img src="{% static 'broadways_emblem.png' %}" alt="Broadways" class="w-24 h-24 max-w-none" style="mix-blend-mode: screen; filter: brightness(1.2);">
            </div>
            <h1 class="text-3xl font-black text-white tracking-[.15em] uppercase font-display">Broadways</h1>
            <p class="text-accent font-bold text-xs uppercase tracking-[.4em] mt-1 font-display">Administrative Portal</p>
        </div>

        <div class="glass p-8 md:p-10 rounded-[2.5rem] shadow-2xl">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                {% if messages %}
                <div class="p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-medium">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
                {% endif %}

                <div>
                    <label class="block text-white/60 text-xs font-bold uppercase tracking-widest mb-2 ml-1">Admin Username</label>
                    <div class="relative group">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-accent transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        {{ form.username }}
                    </div>
                </div>

                <div>
                    <label class="block text-white/60 text-xs font-bold uppercase tracking-widest mb-2 ml-1">Password</label>
                    <div class="relative group">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-accent transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        {{ form.password }}
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-accent hover:bg-accent-dark text-white font-bold py-4 rounded-2xl shadow-xl shadow-accent/20 transition-all hover:scale-[1.02] active:scale-[0.98] tracking-widest uppercase font-display">
                        Login to Admin Dashboard
                    </button>
                </div>
            </form>
            
            <div class="mt-8 text-center">
                <a href="{% url 'home' %}" class="text-white/40 hover:text-white/60 text-xs font-medium transition-colors">← Back to Main Website</a>
            </div>
        </div>

        <p class="mt-10 text-center text-white/20 text-[10px] uppercase tracking-[.3em] font-bold">
            &copy; 2026 BROADWAYS INTERNATIONAL PVT. LTD.
        </p>
    </div>

    <style>
        input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: white !important;
        }
        input:focus {
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: #D4621A !important;
        }
        input::placeholder { color: rgba(255,255,255,0.2); }
    </style>
</body>
</html>
